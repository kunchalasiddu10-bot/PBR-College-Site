services:
  # ─── BACKEND (Node.js + Express + Socket.io) ─────────────────────
  - type: web
    name: campusverse-server
    env: node
    region: singapore        # closest to India
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false          # Set this in Render dashboard — your Atlas URI
      - key: JWT_ACCESS_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: CLIENT_URL
        fromService:
          type: web
          name: campusverse-client
          property: host

  # ─── FRONTEND (React + Vite → Static Site) ───────────────────────
  - type: web
    name: campusverse-client
    env: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: campusverse-server
          property: host
      - key: VITE_SOCKET_URL
        fromService:
          type: web
          name: campusverse-server
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
